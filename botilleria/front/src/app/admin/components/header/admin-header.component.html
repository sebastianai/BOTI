<header class="admin-header">
  <div class="admin-header__inner">
    <button class="admin-header__menu" (click)="toggleSidebar.emit()" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>

    <div class="admin-header__brand">
      <img src="assets/img/logo-4vasos-negro.png" alt="Botillería" class="admin-header__brand-logo" />
      <div class="admin-header__brand-text">
        <span class="admin-header__brand-name">Botillería</span>
        <span class="admin-header__brand-tag">Admin</span>
      </div>
    </div>

    <div class="admin-header__spacer"></div>

    <div class="admin-header__user">
      <div class="admin-header__user-info">
        <span class="admin-header__user-nombre">{{ auth.usuario()?.nombre }}</span>
        <span class="admin-header__user-rol">{{ auth.usuario()?.rol }}</span>
      </div>
      <div class="admin-header__avatar">
        {{ (auth.usuario()?.nombre ?? 'A')[0].toUpperCase() }}
      </div>
    </div>

    <button class="admin-header__logout" (click)="auth.logout()" aria-label="Cerrar sesión" title="Cerrar sesión">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>
