<header class="header">
  <div class="header__inner">
    <button class="header__menu" (click)="toggleSidebar.emit()" aria-label="Abrir menú">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="header__brand">
      <img
        class="header__brand-logo"
        [src]="portalConfig.logoUrl(portalConfig.config().logo_url)"
        [alt]="portalConfig.config().nombre_negocio" />
      <div class="header__brand-text">
        <span class="header__brand-name">{{ portalConfig.config().nombre_negocio }}</span>
        <span class="header__brand-tagline">{{ portalConfig.config().tagline }}</span>
      </div>
    </div>

    <div class="header__spacer"></div>

    <button class="header__cart" (click)="toggleCarrito.emit()" aria-label="Ver carrito de compras">
      <div class="header__cart-icon-wrap">
        <span class="header__cart-icon">🛒</span>
        @if (carritoService.totalItems() > 0) {
          <span class="header__cart-badge">{{ carritoService.totalItems() }}</span>
        }
      </div>
      <div class="header__cart-info">
        <span class="header__cart-label">Mi carrito</span>
        <span class="header__cart-total">{{ formatearPrecio(carritoService.totalPrecio()) }}</span>
      </div>
    </button>
  </div>
</header>
