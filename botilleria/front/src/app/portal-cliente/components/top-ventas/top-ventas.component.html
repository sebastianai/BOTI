@if (productos() && productos().length > 0) {
  <section class="top-ventas">
    <div class="section-title">
      <h2>Top Ventas</h2>
    </div>

    <div class="top-ventas__wrapper" #wrapper>
      <div class="top-ventas__scroll" #track (scroll)="onScroll()">
        @for (p of productos(); track p.id) {
          <article class="tv-card" [class.tv-card--agregado]="estaAgregado(p.id)" (click)="onProductoClick(p)">
            <div class="tv-card__imagen">
              <img [src]="urlImagen(p.imagen)" [alt]="p.nombre" class="tv-card__foto" />
              @if (p.precioOriginal) {
                <span class="tv-card__oferta">OFERTA</span>
              }
            </div>
            <div class="tv-card__body">
              <p class="tv-card__nombre">{{ p.nombre }}</p>
              <p class="tv-card__marca">{{ p.marca }}</p>
              <div class="tv-card__footer">
                <span class="tv-card__precio">{{ formatearPrecio(p.precio) }}</span>
                <button
                  class="tv-card__btn"
                  [class.tv-card__btn--agregado]="estaAgregado(p.id)"
                  (click)="agregar(p); $event.stopPropagation()"
                  [disabled]="estaAgregado(p.id)">
                  {{ estaAgregado(p.id) ? '✓' : '+' }}
                </button>
              </div>
            </div>
          </article>
        }
      </div>

      <button
        class="tv-carousel-btn tv-carousel-btn--prev"
        [style.top]="btnTop()" [style.left]="btnPrevL()"
        (click)="anterior()" [disabled]="!puedeAnterior()"
        aria-label="Anterior">&#8249;</button>

      <button
        class="tv-carousel-btn tv-carousel-btn--next"
        [style.top]="btnTop()" [style.left]="btnNextL()"
        (click)="siguiente()" [disabled]="!puedeSiguiente()"
        aria-label="Siguiente">&#8250;</button>
    </div>
  </section>
}
