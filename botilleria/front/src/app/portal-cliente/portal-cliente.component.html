<div class="portal-layout">
  <app-header (toggleCarrito)="carritoAbierto.set(!carritoAbierto())" (selectCategoria)="seleccionarCategoria($event)">
  </app-header>

  <main class="portal-main">
    <app-publicidad-carousel></app-publicidad-carousel>
    <app-top-ventas></app-top-ventas>
    <app-productos [categoria]="categoriaSeleccionada()"></app-productos>
    <app-mapa-local></app-mapa-local>
  </main>

  <app-carrito [abierto]="carritoAbierto()" (cerrar)="carritoAbierto.set(false)">
  </app-carrito>

  @if (carritoAbierto()) {
    <div class="overlay overlay--carrito" (click)="carritoAbierto.set(false)"></div>
  }
</div>
