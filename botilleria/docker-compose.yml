services:
  postgres:
    image: postgres:16-alpine
    container_name: botilleria-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: botilleria
      POSTGRES_PASSWORD: botilleria123
      POSTGRES_DB: botilleria
    ports:
      - "5433:5432"
    volumes:
      - botilleria_pg_data:/var/lib/postgresql/data
      - ./back/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botilleria"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  botilleria_pg_data:
